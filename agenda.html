<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Diária</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141417;
    --surface2: #1c1c21;
    --border: #2a2a32;
    --accent: #c8f135;
    --accent2: #7b5cf0;
    --text: #e8e8f0;
    --muted: #6b6b7e;
    --danger: #ff4d6d;
    --warn: #ffb703;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 80px;
  }

  /* HEADER */
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 36px;
    gap: 16px;
    flex-wrap: wrap;
  }

  .header-left h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(28px, 5vw, 44px);
    letter-spacing: -1px;
    line-height: 1;
    color: var(--text);
  }

  .header-left h1 span { color: var(--accent); }

  .live-clock {
    font-family: 'Syne', sans-serif;
    font-size: clamp(18px, 3vw, 26px);
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
    background: #1a1f0d;
    border: 1px solid #3a4a1a;
    padding: 8px 16px;
    border-radius: 8px;
  }

  .date-label {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* PROGRESS BAR */
  .day-progress {
    margin-bottom: 32px;
  }

  .day-progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .progress-track {
    background: var(--surface2);
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
  }

  .progress-fill {
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    height: 100%;
    border-radius: 4px;
    transition: width 60s linear;
  }

  /* ADD FORM */
  .add-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 32px;
  }

  .add-section h2 {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .form-row.single { grid-template-columns: 1fr; }
  .form-row.triple { grid-template-columns: 2fr 1fr 1fr; }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  input, select, textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
  }

  textarea { resize: vertical; min-height: 60px; }

  select option { background: var(--surface2); }

  .btn-add {
    width: 100%;
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 4px;
  }

  .btn-add:hover { opacity: 0.88; }
  .btn-add:active { transform: scale(0.98); }

  /* TIMELINE */
  .timeline-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    gap: 12px;
    flex-wrap: wrap;
  }

  .timeline-header h2 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
  }

  .filter-tabs {
    display: flex;
    gap: 8px;
  }

  .tab {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--accent);
    color: #0d0d0f;
    border-color: var(--accent);
    font-weight: 600;
  }

  /* EVENT CARD */
  .events-list { display: flex; flex-direction: column; gap: 12px; }

  .event-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent2);
    border-radius: 12px;
    padding: 16px 20px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 16px;
    align-items: start;
    transition: transform 0.15s, box-shadow 0.15s;
    animation: slideIn 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .event-card:hover {
    transform: translateX(4px);
    box-shadow: -4px 0 20px rgba(200,241,53,0.08);
  }

  .event-card.done {
    opacity: 0.45;
    border-left-color: var(--muted);
  }

  .event-card.done .event-title { text-decoration: line-through; }

  .event-card.upcoming { border-left-color: var(--accent); }
  .event-card.warning { border-left-color: var(--warn); }
  .event-card.past { border-left-color: var(--muted); opacity: 0.6; }

  .event-card[data-cat="trabalho"] { border-left-color: #60a5fa; }
  .event-card[data-cat="saúde"] { border-left-color: #34d399; }
  .event-card[data-cat="pessoal"] { border-left-color: #f472b6; }
  .event-card[data-cat="estudo"] { border-left-color: #fb923c; }
  .event-card[data-cat="lazer"] { border-left-color: #a78bfa; }

  .event-time-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    min-width: 56px;
  }

  .event-time {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .event-end-time {
    font-size: 11px;
    color: var(--muted);
  }

  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); margin-top: 4px; }
  .event-card.upcoming .dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .event-card.warning .dot { background: var(--warn); animation: pulse 1s infinite; }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,183,3,0.6); }
    50% { box-shadow: 0 0 0 6px rgba(255,183,3,0); }
  }

  .event-body { flex: 1; }

  .event-cat-badge {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: var(--surface2);
    border-radius: 4px;
    padding: 2px 8px;
    margin-bottom: 6px;
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .event-title {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 4px;
    line-height: 1.2;
  }

  .event-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }

  .alarm-badge {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--warn);
    margin-top: 6px;
  }

  .event-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .btn-icon {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 14px;
    color: var(--muted);
    transition: all 0.2s;
  }

  .btn-icon:hover { border-color: var(--accent); color: var(--accent); }
  .btn-icon.del:hover { border-color: var(--danger); color: var(--danger); }

  /* ALARM TOAST */
  #alarm-toast {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 340px;
  }

  .toast {
    background: #1a1f0d;
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 16px 20px;
    box-shadow: 0 8px 32px rgba(200,241,53,0.2);
    animation: toastIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
  }

  .toast.danger { border-color: var(--danger); background: #1a0d12; box-shadow: 0 8px 32px rgba(255,77,109,0.2); }

  @keyframes toastIn {
    from { opacity: 0; transform: translateX(100px) scale(0.9); }
    to { opacity: 1; transform: none; }
  }

  .toast-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 14px;
    color: var(--accent);
    margin-bottom: 4px;
    letter-spacing: 1px;
  }

  .toast.danger .toast-title { color: var(--danger); }

  .toast-body {
    font-size: 13px;
    color: var(--text);
    line-height: 1.4;
  }

  .toast-close {
    position: absolute;
    top: 10px;
    right: 12px;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
  }

  /* STATS ROW */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    text-align: center;
  }

  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  /* ALARM PERMISSION BANNER */
  .perm-banner {
    background: #1a140d;
    border: 1px solid var(--warn);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 13px;
    color: var(--warn);
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .perm-banner:hover { opacity: 0.8; }
  .perm-banner.hidden { display: none; }

  @media (max-width: 600px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .form-row.triple { grid-template-columns: 1fr 1fr; }
    .form-row.triple > :first-child { grid-column: 1/-1; }
    .event-card { grid-template-columns: auto 1fr auto; }
  }
</style>
</head>
<body>

<div id="alarm-toast"></div>

<header>
  <div class="header-left">
    <h1>Agenda<span>.</span></h1>
    <div class="date-label" id="date-label">—</div>
  </div>
  <div class="live-clock" id="live-clock">00:00:00</div>
</header>

<div class="day-progress">
  <div class="day-progress-label">
    <span>início do dia — 06:00</span>
    <span id="pct-label">0%</span>
    <span>fim — 23:59</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="day-fill" style="width:0%"></div></div>
</div>

<div id="perm-banner" class="perm-banner" onclick="requestNotifPerm()">
  🔔 Clique aqui para ativar notificações de alarme no navegador
</div>

<!-- ADD FORM -->
<div class="add-section">
  <h2>+ Novo Compromisso</h2>
  <div class="form-row triple">
    <div>
      <label>Título</label>
      <input id="f-title" type="text" placeholder="Ex: Reunião de planejamento">
    </div>
    <div>
      <label>Início</label>
      <input id="f-start" type="time">
    </div>
    <div>
      <label>Fim</label>
      <input id="f-end" type="time">
    </div>
  </div>
  <div class="form-row">
    <div>
      <label>Categoria</label>
      <select id="f-cat">
        <option value="trabalho">💼 Trabalho</option>
        <option value="saúde">💚 Saúde</option>
        <option value="pessoal">🌸 Pessoal</option>
        <option value="estudo">📚 Estudo</option>
        <option value="lazer">🎮 Lazer</option>
        <option value="outro">⚡ Outro</option>
      </select>
    </div>
    <div>
      <label>Alarme antes (min)</label>
      <select id="f-alarm">
        <option value="0">Sem alarme</option>
        <option value="5">5 minutos antes</option>
        <option value="10" selected>10 minutos antes</option>
        <option value="15">15 minutos antes</option>
        <option value="30">30 minutos antes</option>
        <option value="60">1 hora antes</option>
      </select>
    </div>
  </div>
  <div class="form-row single">
    <div>
      <label>Descrição (opcional)</label>
      <textarea id="f-desc" placeholder="Detalhes, links, anotações..."></textarea>
    </div>
  </div>
  <button class="btn-add" onclick="addEvent()">Adicionar Compromisso</button>
</div>

<!-- STATS -->
<div class="stats-row">
  <div class="stat-card"><div class="stat-num" id="s-total">0</div><div class="stat-label">Total</div></div>
  <div class="stat-card"><div class="stat-num" id="s-done">0</div><div class="stat-label">Feitos</div></div>
  <div class="stat-card"><div class="stat-num" id="s-next">—</div><div class="stat-label">Próximo</div></div>
  <div class="stat-card"><div class="stat-num" id="s-remain">0</div><div class="stat-label">Restantes</div></div>
</div>

<!-- TIMELINE -->
<div class="timeline-header">
  <h2>Hoje</h2>
  <div class="filter-tabs">
    <button class="tab active" onclick="setFilter('todos',this)">Todos</button>
    <button class="tab" onclick="setFilter('pendentes',this)">Pendentes</button>
    <button class="tab" onclick="setFilter('feitos',this)">Feitos</button>
  </div>
</div>

<div class="events-list" id="events-list">
  <div class="empty"><div class="empty-icon">📋</div><p>Nenhum compromisso ainda.<br>Adicione um acima!</p></div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
let events = JSON.parse(localStorage.getItem('agenda_events') || '[]');
let firedAlarms = JSON.parse(localStorage.getItem('agenda_fired') || '{}');
let filter = 'todos';

// Clear fired alarms from previous days
const today = new Date().toDateString();
if (localStorage.getItem('agenda_alarm_day') !== today) {
  firedAlarms = {};
  localStorage.setItem('agenda_alarm_day', today);
}

// ─── CLOCK + PROGRESS ────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('live-clock').textContent = `${h}:${m}:${s}`;

  const days = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const months = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  document.getElementById('date-label').textContent =
    `${days[now.getDay()]}, ${now.getDate()} de ${months[now.getMonth()]} de ${now.getFullYear()}`;

  // day progress: 06:00 to 23:59
  const startMin = 6*60, endMin = 23*60+59;
  const curMin = now.getHours()*60 + now.getMinutes();
  const pct = Math.min(100, Math.max(0, ((curMin - startMin)/(endMin - startMin))*100));
  document.getElementById('day-fill').style.width = pct.toFixed(1)+'%';
  document.getElementById('pct-label').textContent = pct.toFixed(0)+'%';

  // check alarms
  checkAlarms(now);
}

// ─── ALARMS ──────────────────────────────────────────────────────────────────
function checkAlarms(now) {
  const curMin = now.getHours()*60 + now.getMinutes();
  events.forEach(ev => {
    if (ev.done || !ev.alarm) return;
    const [h,m] = ev.start.split(':').map(Number);
    const evMin = h*60 + m;
    const triggerMin = evMin - parseInt(ev.alarm);
    const key = ev.id + '_' + ev.alarm;
    if (curMin === triggerMin && !firedAlarms[key]) {
      firedAlarms[key] = true;
      localStorage.setItem('agenda_fired', JSON.stringify(firedAlarms));
      fireAlarm(ev);
    }
    // fire at exact time too
    const keyNow = ev.id + '_now';
    if (curMin === evMin && !firedAlarms[keyNow]) {
      firedAlarms[keyNow] = true;
      localStorage.setItem('agenda_fired', JSON.stringify(firedAlarms));
      fireAlarmNow(ev);
    }
  });
}

function fireAlarm(ev) {
  showToast(`⏰ Em ${ev.alarm} min`, `${ev.title} começa às ${ev.start}`, false);
  notify(`⏰ Em ${ev.alarm} min: ${ev.title}`, `Começa às ${ev.start}`);
  beep();
}

function fireAlarmNow(ev) {
  showToast(`🚨 Agora!`, `${ev.title} está começando!`, true);
  notify(`🚨 ${ev.title} está começando!`, `Hora: ${ev.start}`);
  beep(true);
}

function showToast(title, body, danger=false) {
  const container = document.getElementById('alarm-toast');
  const t = document.createElement('div');
  t.className = 'toast' + (danger ? ' danger' : '');
  t.innerHTML = `<div class="toast-title">${title}</div>
    <div class="toast-body">${body}</div>
    <button class="toast-close" onclick="this.parentElement.remove()">✕</button>`;
  container.appendChild(t);
  setTimeout(() => t.remove(), 12000);
}

function notify(title, body) {
  if (Notification.permission === 'granted') {
    new Notification(title, { body, icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">📅</text></svg>' });
  }
}

function beep(urgent=false) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const times = urgent ? [0, 0.15, 0.3] : [0, 0.2];
    times.forEach(t => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = urgent ? 880 : 660;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.3, ctx.currentTime + t);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.12);
      osc.start(ctx.currentTime + t);
      osc.stop(ctx.currentTime + t + 0.15);
    });
  } catch(e) {}
}

async function requestNotifPerm() {
  const r = await Notification.requestPermission();
  if (r === 'granted') document.getElementById('perm-banner').classList.add('hidden');
}

// ─── EVENTS CRUD ─────────────────────────────────────────────────────────────
function addEvent() {
  const title = document.getElementById('f-title').value.trim();
  const start = document.getElementById('f-start').value;
  const end   = document.getElementById('f-end').value;
  const cat   = document.getElementById('f-cat').value;
  const alarm = document.getElementById('f-alarm').value;
  const desc  = document.getElementById('f-desc').value.trim();

  if (!title || !start) { shakeForm(); return; }

  const ev = { id: Date.now(), title, start, end, cat, alarm, desc, done: false };
  events.push(ev);
  events.sort((a,b) => a.start.localeCompare(b.start));
  save();
  renderEvents();
  clearForm();
}

function shakeForm() {
  const section = document.querySelector('.add-section');
  section.style.animation = 'shake 0.3s ease';
  setTimeout(() => section.style.animation = '', 300);
}

function deleteEvent(id) {
  events = events.filter(e => e.id !== id);
  save();
  renderEvents();
}

function toggleDone(id) {
  const ev = events.find(e => e.id === id);
  if (ev) ev.done = !ev.done;
  save();
  renderEvents();
}

function save() {
  localStorage.setItem('agenda_events', JSON.stringify(events));
}

function clearForm() {
  ['f-title','f-start','f-end','f-desc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-alarm').value = '10';
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
const catEmojis = { trabalho:'💼', saúde:'💚', pessoal:'🌸', estudo:'📚', lazer:'🎮', outro:'⚡' };

function getStatus(ev) {
  const now = new Date();
  const curMin = now.getHours()*60 + now.getMinutes();
  const [sh,sm] = ev.start.split(':').map(Number);
  const startMin = sh*60+sm;
  if (ev.done) return 'done';
  if (curMin < startMin - 15) return 'upcoming';
  if (curMin >= startMin - 15 && curMin < startMin) return 'warning';
  if (curMin >= startMin) return (ev.end ? (() => { const [eh,em]=ev.end.split(':').map(Number); return curMin < eh*60+em ? 'warning' : 'past'; })() : 'past');
  return 'upcoming';
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderEvents();
}

function renderEvents() {
  const now = new Date();
  const curMin = now.getHours()*60 + now.getMinutes();

  // stats
  const total = events.length;
  const done = events.filter(e => e.done).length;
  const remain = events.filter(e => {
    if (e.done) return false;
    const [h,m] = e.start.split(':').map(Number);
    return h*60+m >= curMin;
  }).length;
  const nextEv = events.find(e => {
    if (e.done) return false;
    const [h,m] = e.start.split(':').map(Number);
    return h*60+m > curMin;
  });

  document.getElementById('s-total').textContent = total;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-next').textContent = nextEv ? nextEv.start : '—';
  document.getElementById('s-remain').textContent = remain;

  // filter
  let filtered = events;
  if (filter === 'pendentes') filtered = events.filter(e => !e.done);
  if (filter === 'feitos') filtered = events.filter(e => e.done);

  const list = document.getElementById('events-list');

  if (!filtered.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><p>Nenhum compromisso aqui ainda.</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(ev => {
    const status = getStatus(ev);
    const emoji = catEmojis[ev.cat] || '⚡';
    const alarmLabel = ev.alarm !== '0' ? `<div class="alarm-badge">🔔 Alarme ${ev.alarm} min antes</div>` : '';
    const descHtml = ev.desc ? `<div class="event-desc">${ev.desc}</div>` : '';
    const endHtml = ev.end ? `<div class="event-end-time">até ${ev.end}</div>` : '';
    return `
    <div class="event-card ${status}" data-cat="${ev.cat}" data-id="${ev.id}">
      <div class="event-time-col">
        <div class="event-time">${ev.start}</div>
        ${endHtml}
        <div class="dot"></div>
      </div>
      <div class="event-body">
        <div class="event-cat-badge">${emoji} ${ev.cat}</div>
        <div class="event-title">${ev.title}</div>
        ${descHtml}
        ${alarmLabel}
      </div>
      <div class="event-actions">
        <button class="btn-icon" title="${ev.done ? 'Desfazer' : 'Marcar como feito'}" onclick="toggleDone(${ev.id})">${ev.done ? '↩' : '✓'}</button>
        <button class="btn-icon del" title="Remover" onclick="deleteEvent(${ev.id})">✕</button>
      </div>
    </div>`;
  }).join('');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
if (Notification.permission === 'granted') {
  document.getElementById('perm-banner').classList.add('hidden');
}

// Inject shake keyframe
const style = document.createElement('style');
style.textContent = `@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }`;
document.head.appendChild(style);

renderEvents();
updateClock();
setInterval(updateClock, 1000);
setInterval(renderEvents, 30000); // re-render every 30s to update statuses
</script>
</body>
</html>
